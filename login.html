<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - AIONION Capital KYC Operations</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f172a;
      --surface-color: #1e293b;
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
      --text-color: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --error-color: #ef4444;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .login-container {
      background-color: var(--surface-color);
      padding: 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-color);
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 30px;
    }

    .brand h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: white;
      margin-bottom: 5px;
    }

    .brand p {
      color: var(--primary-color);
      font-weight: 500;
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
      background-color: var(--bg-color);
      color: var(--text-color);
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 10px;
    }

    .login-btn:hover {
      background-color: var(--primary-hover);
    }

    .login-btn:disabled {
      background-color: var(--text-muted);
      cursor: not-allowed;
    }

    .error-msg {
      color: var(--error-color);
      font-size: 0.9rem;
      text-align: center;
      margin-top: 15px;
      min-height: 20px;
      display: none;
    }

    .loading-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="brand">
      <h1>AIONION Capital</h1>
      <p>KYC Operations Dashboard</p>
    </div>
    
    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>
      
      <button type="submit" id="login-btn" class="login-btn">
        <span id="btn-text">Sign In</span>
        <div id="loading-spinner" class="loading-spinner"></div>
      </button>

      <div id="error-msg" class="error-msg"></div>
    </form>
  </div>

  <script>
    const API_BASE_URL = 'https://xvbefkfln5.execute-api.ap-south-1.amazonaws.com/admin/kyc-dashboard';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn = document.getElementById('login-btn');
      const btnText = document.getElementById('btn-text');
      const spinner = document.getElementById('loading-spinner');
      const errorMsg = document.getElementById('error-msg');

      if (!username || !password) return;

      // Loading state
      btn.disabled = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      errorMsg.style.display = 'none';

      try {
        const response = await fetch(`${API_BASE_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          localStorage.setItem('kyc_auth_token', data.token);
          localStorage.setItem('kyc_user', JSON.stringify(data.user));
          // Redirect to dashboard
          window.location.href = 'dashboard.html';
        } else {
          const detail = data.error ? ` (${data.error})` : '';
          errorMsg.textContent = (data.message || 'Invalid credentials') + detail;
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btnText.style.display = 'block';
          spinner.style.display = 'none';
        }
      } catch (err) {
        errorMsg.textContent = 'Network error. Please try again.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btnText.style.display = 'block';
        spinner.style.display = 'none';
      }
    });

    // If already logged in, redirect to dashboard
    if (localStorage.getItem('kyc_auth_token') && localStorage.getItem('kyc_user')) {
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
